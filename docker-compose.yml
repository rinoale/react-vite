services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mabinogi-backend
    working_dir: /app/backend
    command: uvicorn main:app --reload --port 8000 --host 0.0.0.0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./configs:/app/configs
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mabinogi-frontend
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
