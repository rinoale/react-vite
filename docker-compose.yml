services:
  db:
    build:
      context: ./infra/database
      dockerfile: Dockerfile
    container_name: mabinogi-db
    environment:
      POSTGRES_DB: mabinogi
      POSTGRES_USER: mabinogi
      POSTGRES_PASSWORD: mabinogi
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/database/init:/docker-entrypoint-initdb.d
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mabinogi-backend
    working_dir: /app/backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mabinogi
      DB_USER: mabinogi
      DB_PASSWORD: mabinogi
    command: >
      sh -lc "pip install -r /app/backend/requirements.txt &&
      uvicorn main:app --reload --port 8000 --host 0.0.0.0"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./configs:/app/configs
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mabinogi-frontend
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
