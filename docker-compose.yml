services:
  nginx:
    image: nginx:alpine
    container_name: mabinogi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mabinogi-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-devredis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  db:
    build:
      context: ./infra/database
      dockerfile: Dockerfile
    container_name: mabinogi-db
    environment:
      POSTGRES_DB: mabinogi
      POSTGRES_USER: mabinogi
      POSTGRES_PASSWORD: mabinogi
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: mabinogi-backend
    working_dir: /app/backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mabinogi
      DB_USER: mabinogi
      DB_PASSWORD: mabinogi
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
    command: >
      sh -lc "ln -sf /app/env/.env.development /app/backend/.env.development &&
      pip install --user -r /app/backend/requirements.txt &&
      alembic upgrade head &&
      uvicorn main:app --reload --port 8000 --host 0.0.0.0"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - /home/gbsong/workspace/ocr_training_data/mabinogi/ocr:/app/backend/ocr
      - /home/gbsong/workspace/ocr_training_data/mabinogi/data:/app/data
      - /home/gbsong/workspace/ocr_training_data/env:/app/env:ro
      - ./configs:/app/configs
      - ./logs:/app/logs
      - ./tmp:/app/tmp
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mabinogi-frontend
    working_dir: /app
    environment:
      MABINOGI_TRADE_API_URL: https://dev.mabitra.local
    ports:
      - "5173:5173"
      - "5174:5174"
      - "5175:5175"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: mabinogi-worker
    working_dir: /app/backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mabinogi
      DB_USER: mabinogi
      DB_PASSWORD: mabinogi
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
    command: >
      sh -lc "ln -sf /app/env/.env.development /app/backend/.env.development &&
      pip install --user -r /app/backend/requirements.txt &&
      python worker.py"
    volumes:
      - ./backend:/app/backend
      - /home/gbsong/workspace/ocr_training_data/mabinogi/data:/app/data
      - ./configs:/app/configs
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
