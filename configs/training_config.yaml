# OCR Training Configuration
# Single source of truth for all training parameters.
# Used by: train command, create_model_config.py, custom_mabinogi.yaml
#
# IMPORTANT: When changing imgH, imgW, or network_params here,
# you MUST re-run: python3 scripts/create_model_config.py
# This regenerates backend/ocr/models/custom_mabinogi.yaml so inference
# matches training. Mismatched imgW will cause TPS layer shape errors.

# --- Model Architecture (must match between training and inference) ---
model:
  Transformation: TPS
  FeatureExtraction: ResNet
  SequenceModeling: BiLSTM
  Prediction: CTC
  input_channel: 1
  output_channel: 512
  hidden_size: 256
  num_fiducial: 20
  imgH: 32
  imgW: 200           # Fixed via patched inference (ocr_utils.py). Training and inference now match.

# --- Training Hyperparameters ---
training:
  batch_size: 64      # imgW=200 fits comfortably in 8GB VRAM
  num_iter: 20000
  valInterval: 500
  batch_max_length: 55
  workers: 0          # Required — LMDB can't be pickled for multiprocessing
  sensitive: true     # Required — prevents lowercasing (needed for R,G,B,L,A-F)
  PAD: true           # Required — matches EasyOCR's hardcoded keep_ratio_with_pad=True

# --- Data Paths (relative to project root) ---
paths:
  train_data: backend/ocr/train_data_lmdb
  valid_data: backend/ocr/train_data_lmdb
  character_file: backend/unique_chars.txt
  model_config: backend/ocr/models/custom_mabinogi.yaml
  model_weights: backend/ocr/models/custom_mabinogi.pth
  saved_models_dir: saved_models

# --- Inference (EasyOCR) ---
inference:
  lang_list: [ko]
  rgb: false
