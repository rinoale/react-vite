# Mabinogi Tooltip Section Configuration
# Defines how to detect and categorize sections in item tooltip images.
# Used by MabinogiTooltipParser to produce structured item data.

game: mabinogi
version: 1

# Section definitions, ordered by typical appearance in tooltips.
# header_patterns: OCR text patterns that identify the section header line.
#   Matched with fuzzy matching (contains check) since OCR may add/drop chars.
# ocr: whether to OCR the lines in this section (false = structural parse or skip)
# skip: whether to omit this section from output entirely
# parse_mode: special parsing logic (e.g. "color_parts" for structured RGB extraction)
sections:
  item_name:
    order: 1
    description: "Full item name (first line)"
    required: true
    ocr: true

  item_type:
    order: 2
    description: "Item category (천옷, 경갑옷, 양손 검, 액세서리, etc.)"
    required: false
    ocr: true

  item_grade:
    order: 5
    description: "Item grade (에픽, 레어, 마스터, etc.) and grade bonus"
    header_patterns:
      - "등급"
    required: false
    ocr: true

  item_attrs:
    order: 10
    description: "Core stats: 방어력, 보호, 내구력, 공격, 부상률, 크리티컬, etc."
    header_patterns:
      - "아이템 속성"
    required: true
    ocr: true

  enchant:
    order: 20
    description: "Enchantments: [접두] prefix and [접미] suffix enchants with effects"
    header_patterns:
      - "인챈트"
    required: false
    ocr: true
    parse_mode: enchant_options

  item_mod:
    order: 30
    description: "Modifications: 일반 개조, 장인 개조, 특별 개조, 담금질, 보석 개조"
    header_patterns:
      - "개조"
    required: false
    ocr: true

  reforge:
    order: 40
    description: "Reforging stats with levels — important for marketplace search"
    header_patterns:
      - "세공"
    required: false
    ocr: true
    parse_mode: reforge_options

  erg:
    order: 50
    description: "Erg upgrade info: grade, level, effects"
    header_patterns:
      - "에르그"
    required: false
    ocr: true

  set_item:
    order: 60
    description: "Set item effects and activation conditions"
    header_patterns:
      - "세트아이템"
    required: false
    ocr: true

  item_color:
    order: 70
    description: "Item color parts (파트 A-F with RGB values)"
    header_patterns:
      - "아이템 색상"
    required: false
    ocr: false
    parse_mode: color_parts

  ego:
    order: 75
    description: "정령 (ego/spirit) weapon stats and level"
    header_patterns:
      - "정령"
    required: false
    skip: true

  flavor_text:
    order: 80
    description: "Item description / flavor text — not needed for marketplace"
    required: false
    skip: true

  shop_price:
    order: 90
    description: "Shop sell price — not needed for marketplace"
    header_patterns:
      - "상점판매가"
    required: false
    skip: true

# Horizontal split threshold multiplier.
# Gaps wider than line_height * this value trigger horizontal splitting.
# Normal inter-character gaps are 1-8px; color part gaps are 15-85px.
# Factor 1.5 reliably splits multi-digit RGB values across all line heights.
# Line prefix characters used in Mabinogi tooltips.
# Used by TextCorrector for prefix stripping before fuzzy matching.
prefixes:
  bullet: "."       # OCR outputs period for the in-game middle dot (·)
  subbullet: "ㄴ"   # sub-bullet: ㄴ (Korean nieun)

horizontal_split_factor: 1.5

# Header detection parameters (v3 segment-first pipeline)
# Used by backend/lib/tooltip_segmenter.py — single source of truth.
header_detection:
  # Step 1: Find orange header text via color mask + horizontal projection
  orange:
    r_min: 150           # R > this
    g_min: 50            # G > this
    g_max: 180           # G < this
    b_max: 80            # B < this
    min_band_height: 8   # minimum consecutive rows with orange pixels
    min_band_pixels: 40  # minimum total orange pixels in the band

  # Step 2: Expand from orange text outward until black square boundary ends
  # Uses reference columns just right of the orange text (avoids left-border interference)
  boundary:
    pure_black_max: 0    # max(R,G,B) <= this counts as pure-black
    ref_columns: 10      # number of columns to check right of orange x_max
    density_threshold: 0.2  # fraction of ref columns that must be pure-black to continue expanding
    max_expansion: 40    # max rows to search in each direction from orange band

  # Step 3: Grey-line cap — structural bound for black-square expansion
  # Each header has a grey separator line (RGB 132,132,132) running through it.
  # The expanded header is capped at grey_y - cap_above to grey_y + cap_below.
  grey:
    val: 132               # exact grey border pixel value (all channels)
    min_density: 0.5       # fraction of row width that must be grey
    cap_above: 7           # max pixels above grey line (header top)
    cap_below: 8           # max pixels below grey line (header bottom)

  # Header OCR preprocessing and section label matching
  ocr:
    threshold: 50        # grayscale > this → black (text), else white (bg)
    match_cutoff: 50     # minimum fuzzy match score to accept section label
