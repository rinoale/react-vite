services:
  db:
    image: postgres:16-alpine
    container_name: mabi-db
    environment:
      POSTGRES_DB: mabinogi
      POSTGRES_USER: mabinogi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mabinogi}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    image: mabi-backend:latest
    container_name: mabi-backend
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mabinogi
      DB_USER: mabinogi
      DB_PASSWORD: ${DB_PASSWORD:-mabinogi}
    depends_on:
      - db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: mabi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
