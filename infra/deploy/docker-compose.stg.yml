services:
  db:
    image: postgres:16-alpine
    container_name: mabi-db
    environment:
      POSTGRES_DB: mabinogi
      POSTGRES_USER: mabinogi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mabinogi}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mabi-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    image: mabi-base:latest
    container_name: mabi-backend
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mabinogi
      DB_USER: mabinogi
      DB_PASSWORD: ${DB_PASSWORD:-mabinogi}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./app:/app
      - ocr_models:/models
    depends_on:
      - db
      - redis
    restart: unless-stopped

  worker:
    image: mabi-base:latest
    container_name: mabi-worker
    env_file: .env
    working_dir: /app/backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mabinogi
      DB_USER: mabinogi
      DB_PASSWORD: ${DB_PASSWORD:-mabinogi}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["python", "worker.py"]
    volumes:
      - ./app:/app
      - ocr_models:/models
    depends_on:
      - db
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: mabi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: mabi-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

volumes:
  db_data:
  ocr_models:
  redis_data:
  certbot_www:
    name: mabinogi_certbot_www
  certbot_certs:
    name: mabinogi_certbot_certs
