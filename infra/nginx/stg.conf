server {
    listen 80;
    server_name stg.mabitra.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name stg.mabitra.com;

    ssl_certificate /etc/letsencrypt/live/stg.mabitra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stg.mabitra.com/privkey.pem;

    client_max_body_size 10M;

    # Docker internal DNS — re-resolve on each request (no stale cache after restart)
    resolver 127.0.0.11 valid=5s;
    set $backend http://backend:8000;

    location / {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
