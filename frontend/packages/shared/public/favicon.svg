<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="prism" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="ray1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="ray2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="ray3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Input beam -->
  <line x1="32" y1="2" x2="32" y2="14" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- Prism body -->
  <polygon points="32,12 50,46 14,46" fill="url(#prism)" stroke="#fdba74" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Inner highlight -->
  <polygon points="32,20 43,42 21,42" fill="none" stroke="#fff" stroke-width="0.7" opacity="0.25" stroke-linejoin="round"/>

  <!-- Core diamond -->
  <polygon points="32,28 37,35 32,42 27,35" fill="#fef3c7" opacity="0.5"/>

  <!-- Output rays (data streams) -->
  <line x1="22" y1="46" x2="14" y2="60" stroke="url(#ray1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="46" x2="26" y2="60" stroke="url(#ray2)" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="32" y2="61" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="46" x2="38" y2="60" stroke="url(#ray2)" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="46" x2="50" y2="60" stroke="url(#ray3)" stroke-width="3" stroke-linecap="round"/>
</svg>
